<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvem do Gustavo - Red Drive</title>

<style>

/* =========================
   🎨 TEMA PRINCIPAL
========================= */

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #7f0000, #ff0000);
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LAYOUT PRINCIPAL */
.layout {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #111;
    padding: 10px;
    border-right: 2px solid #ff0000;
}

.sidebar h3 {
    color: #ff0000;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* CARDS */
.card {
    background: #161616;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 3px solid #ff0000;
}

/* BOTÕES */
button {
    background: #ff0000;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #b30000;
}

/* INPUTS */
input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: white;
}

/* FILE LIST */
.file {
    background: #1c1c1c;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    border-left: 3px solid #ff0000;
    cursor: pointer;
}

/* VIEWER */
#viewer {
    margin-top: 15px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}

video {
    width: 100%;
}

iframe {
    width: 100%;
    height: 300px;
}

/* LOGIN */
#login {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    border-top: 3px solid #ff0000;
}

/* SCROLL */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-thumb {
    background: #ff0000;
}

</style>
</head>

<body>

<!-- =========================
     🔐 LOGIN
========================= -->
<div id="login">
    <div class="login-box">
        <h2>☁️ Red Drive Gustavo</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- =========================
     🧠 APP PRINCIPAL
========================= -->
<div id="app" style="display:none;">

<header>
    <div>☁️ Nuvem do Gustavo - RED DRIVE</div>
    <button onclick="logout()">Sair</button>
</header>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>📁 Menu</h3>
        <p>• Meus arquivos</p>
        <p>• Upload</p>
        <p>• Vídeos</p>
        <p>• PDFs</p>
        <p>• JSON</p>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- UPLOAD -->
        <div class="card">
            <h3>📤 Upload de Arquivos</h3>

            <input type="file" id="upload" multiple>

            <input type="text" id="filename" placeholder="nome do arquivo">

            <textarea id="content" placeholder="editar conteúdo (opcional)"></textarea>

            <button onclick="saveFile()">Salvar na nuvem</button>
        </div>

        <!-- LIST -->
        <div class="card">
            <h3>📂 Arquivos</h3>
            <div id="list"></div>
        </div>

        <!-- VIEWER -->
        <div class="card">
            <h3>👁 Visualizador</h3>
            <div id="viewer"></div>
        </div>

    </div>

</div>

</div>

<script>

/* =========================
   🔐 LOGIN SIMPLES
========================= */

const SENHA = "Gustavo23@";

function login() {
    let s = document.getElementById("senha").value;

    if (s === SENHA) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadFiles();
    } else {
        alert("Senha incorreta");
    }
}

function logout() {
    location.reload();
}

/* =========================
   📤 UPLOAD
========================= */

let bufferFiles = [];

document.getElementById("upload").addEventListener("change", function(e) {
    bufferFiles = Array.from(e.target.files);
});

/* =========================
   💾 SALVAR
========================= */

function saveFile() {

    if (bufferFiles.length === 0) {
        alert("Selecione arquivos primeiro");
        return;
    }

    bufferFiles.forEach(file => {

        let reader = new FileReader();

        reader.onload = function(e) {

            let obj = {
                name: file.name,
                type: file.type,
                data: e.target.result
            };

            localStorage.setItem("file_" + file.name, JSON.stringify(obj));
            loadFiles();
        };

        reader.readAsDataURL(file);
    });

    bufferFiles = [];
}

/* =========================
   📂 LISTAR
========================= */

function loadFiles() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < localStorage.length; i++) {

        let key = localStorage.key(i);

        if (key.startsWith("file_")) {

            let file = JSON.parse(localStorage.getItem(key));

            let div = document.createElement("div");
            div.className = "file";

            div.innerHTML = `
                <span onclick="openFile('${key}')">📄 ${file.name}</span>
                <button onclick="deleteFile('${key}')">🗑</button>
            `;

            list.appendChild(div);
        }
    }
}

/* =========================
   👁 ABRIR ARQUIVO
========================= */

function openFile(key) {

    let file = JSON.parse(localStorage.getItem(key));
    let viewer = document.getElementById("viewer");

    viewer.innerHTML = "";

    // 🎥 vídeo
    if (file.type.startsWith("video/")) {
        viewer.innerHTML = `<video controls src="${file.data}"></video>`;
    }

    // 📄 PDF
    else if (file.type === "application/pdf") {
        viewer.innerHTML = `<iframe src="${file.data}"></iframe>`;
    }

    // 📝 texto
    else {
        viewer.innerHTML = `<textarea style="height:200px;">${file.data}</textarea>`;
    }
}

/* =========================
   🗑 DELETAR
========================= */

function deleteFile(key) {
    localStorage.removeItem(key);
    loadFiles();
}

/* =========================
   🚀 INICIAR
========================= */

loadFiles();

</script>
