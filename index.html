<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvem do Gustavo</title>

<style>

body {
    margin: 0;
    font-family: system-ui, Arial;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
header {
    background: #b30000;
    padding: 14px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
    background: #111;
    padding: 15px;
    border-right: 2px solid #b30000;
}

/* MAIN */
.main {
    padding: 15px;
    overflow-y: auto;
}

/* CARD */
.card {
    background: #161616;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    border-left: 3px solid #b30000;
}

/* INPUTS */
input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #222;
    color: white;
    border: none;
    border-radius: 6px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #b30000;
    color: white;
    cursor: pointer;
}

/* FILE LIST */
.file {
    background: #1a1a1a;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

/* VIEWER */
#viewer {
    margin-top: 10px;
    background: #0f0f0f;
    padding: 10px;
    border-radius: 10px;
}

video, iframe, img {
    width: 100%;
}

</style>
</head>

<body>

<header>☁️ Nuvem do Gustavo — Modern Drive</header>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>📁 Upload</h3>

        <!-- 🔥 UPLOAD MODERNO (CORRIGIDO) -->
        <input type="file" id="fileInput" multiple>

        <button onclick="uploadFiles()">Enviar para nuvem</button>

        <h3>📂 Ações</h3>
        <button onclick="clearAll()">Limpar tudo</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="card">
            <h3>📄 Arquivos na nuvem</h3>
            <div id="list"></div>
        </div>

        <div class="card">
            <h3>👁 Visualizador</h3>
            <div id="viewer">Selecione um arquivo</div>
        </div>

    </div>

</div>

<script>

/* =========================
   💾 STORAGE SYSTEM FIXADO
========================= */

let db = [];

/* =========================
   📤 UPLOAD CORRIGIDO
========================= */

function uploadFiles() {

    const input = document.getElementById("fileInput");
    const files = Array.from(input.files);

    if (files.length === 0) {
        alert("Selecione arquivos primeiro");
        return;
    }

    files.forEach(file => {

        const reader = new FileReader();

        reader.onload = function(e) {

            const data = {
                id: Date.now() + Math.random(),
                name: file.name,
                type: file.type,
                content: e.target.result
            };

            db.push(data);

            saveToStorage();
            renderList();
        };

        reader.readAsDataURL(file);
    });

    input.value = "";
}

/* =========================
   💾 SAVE LOCAL STORAGE
========================= */

function saveToStorage() {
    localStorage.setItem("drive", JSON.stringify(db));
}

/* =========================
   📂 LOAD
========================= */

function load() {
    const saved = localStorage.getItem("drive");
    if (saved) db = JSON.parse(saved);
}

load();

/* =========================
   📜 LISTA
========================= */

function renderList() {

    const list = document.getElementById("list");
    list.innerHTML = "";

    db.forEach(file => {

        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            <span onclick="openFile(${file.id})">📄 ${file.name}</span>
            <button onclick="deleteFile(${file.id})">🗑</button>
        `;

        list.appendChild(div);
    });
}

/* =========================
   👁 OPEN FILE
========================= */

function openFile(id) {

    const file = db.find(f => f.id === id);
    const viewer = document.getElementById("viewer");

    viewer.innerHTML = "";

    if (!file) return;

    // 🎥 vídeo
    if (file.type.startsWith("video/")) {
        viewer.innerHTML = `<video controls src="${file.content}"></video>`;
    }

    // 📄 PDF
    else if (file.type === "application/pdf") {
        viewer.innerHTML = `<iframe src="${file.content}"></iframe>`;
    }

    // 🖼 imagem
    else if (file.type.startsWith("image/")) {
        viewer.innerHTML = `<img src="${file.content}">`;
    }

    // 📝 texto/json fallback
    else {
        viewer.innerHTML = `<textarea>${file.content}</textarea>`;
    }
}

/* =========================
   🗑 DELETE
========================= */

function deleteFile(id) {

    db = db.filter(f => f.id !== id);

    saveToStorage();
    renderList();
    document.getElementById("viewer").innerHTML = "";
}

/* =========================
   🧹 CLEAR ALL
========================= */

function clearAll() {
    db = [];
    saveToStorage();
    renderList();
    document.getElementById("viewer").innerHTML = "";
}

/* =========================
   🚀 INIT
========================= */

renderList();

</script>

</body>
</html>
