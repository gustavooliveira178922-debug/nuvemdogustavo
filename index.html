<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvem do Gustavo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

.card {
    background: #111827;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    width: 320px;
    text-align: center;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

#app {
    display: none;
    padding: 20px;
}

.topbar {
    background: #0b1220;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.file-area {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.box {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}

.file-list {
    max-height: 200px;
    overflow-y: auto;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="card">
        <h2>☁️ Nuvem do Gustavo</h2>
        <p>Digite a senha</p>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- APP -->
<div id="app">

    <div class="topbar">
        <div>☁️ Nuvem do Gustavo</div>
        <button onclick="logout()" style="width:auto;">Sair</button>
    </div>

    <div class="file-area">

        <div class="box">
            <h3>📁 Arquivos</h3>

            <input type="text" id="filename" placeholder="nome do arquivo">

            <textarea id="content" placeholder="escreva aqui..."></textarea>

            <button onclick="saveFile()">Salvar</button>
            <button onclick="downloadFile()">Baixar</button>
        </div>

        <div class="box">
            <h3>📂 Meus arquivos</h3>
            <div class="file-list" id="list"></div>
            <button onclick="loadFiles()">Atualizar lista</button>
        </div>

    </div>

</div>

<script>

const PASSWORD = "Gustavo23@"; // ⚠️ não é seguro de verdade

function login() {
    const s = document.getElementById("senha").value;

    if (s === PASSWORD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadFiles();
    } else {
        alert("Senha incorreta!");
    }
}

function logout() {
    location.reload();
}

function saveFile() {
    const name = document.getElementById("filename").value;
    const content = document.getElementById("content").value;

    if (!name) return alert("Digite o nome do arquivo!");

    localStorage.setItem("file_" + name, content);
    alert("Arquivo salvo!");
    loadFiles();
}

function downloadFile() {
    const name = document.getElementById("filename").value || "arquivo.txt";
    const content = document.getElementById("content").value;

    const blob = new Blob([content], {type: "text/plain"});
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = name;
    link.click();
}

function loadFiles() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);

        if (key.startsWith("file_")) {
            const name = key.replace("file_", "");

            const div = document.createElement("div");
            div.innerHTML = "📄 " + name;
            div.style.cursor = "pointer";

            div.onclick = () => {
                document.getElementById("filename").value = name;
                document.getElementById("content").value = localStorage.getItem(key);
            };

            list.appendChild(div);
        }
    }
}

</script>

</body>
</html>
