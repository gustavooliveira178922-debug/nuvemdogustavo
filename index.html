<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvem do Gustavo</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

header {
    padding: 15px;
    background: #111827;
    display: flex;
    justify-content: space-between;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 15px;
}

.box {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}

input, textarea, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.file {
    background: #1f2937;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

#viewer {
    margin-top: 10px;
    max-height: 300px;
    overflow: auto;
}
video {
    width: 100%;
}
iframe {
    width: 100%;
    height: 300px;
    border: none;
}
</style>
</head>

<body>

<header>
    <div>☁️ Nuvem do Gustavo</div>
    <div><button onclick="logout()">Sair</button></div>
</header>

<div class="container">

    <!-- UPLOAD -->
    <div class="box">
        <h3>📤 Upload de arquivos</h3>

        <!-- 🔥 BOTÃO DE UPLOAD REAL -->
        <input type="file" id="upload" multiple>

        <input type="text" id="name" placeholder="nome do arquivo">

        <button onclick="save()">Salvar no sistema</button>

        <div id="viewer"></div>
    </div>

    <!-- LISTA -->
    <div class="box">
        <h3>📂 Arquivos</h3>
        <div id="list"></div>
    </div>

</div>

<script>

let files = [];

// 🔥 UPLOAD REAL
document.getElementById("upload").addEventListener("change", function(e) {
    files = Array.from(e.target.files);
    alert(files.length + " arquivo(s) carregado(s)");
});

// SALVAR
function save() {
    if (files.length === 0) return alert("Escolha arquivos primeiro");

    files.forEach(file => {
        const reader = new FileReader();

        reader.onload = function(evt) {
            localStorage.setItem("file_" + file.name, JSON.stringify({
                name: file.name,
                type: file.type,
                data: evt.target.result
            }));

            load();
        };

        reader.readAsDataURL(file);
    });

    files = [];
}

// LISTAR
function load() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);

        if (key.startsWith("file_")) {
            const file = JSON.parse(localStorage.getItem(key));

            const div = document.createElement("div");
            div.className = "file";

            div.innerHTML = `
                <span onclick="openFile('${key}')">📄 ${file.name}</span>
                <button onclick="del('${key}')">🗑</button>
            `;

            list.appendChild(div);
        }
    }
}

// ABRIR / PREVIEW INTELIGENTE
function openFile(key) {
    const file = JSON.parse(localStorage.getItem(key));
    const viewer = document.getElementById("viewer");

    viewer.innerHTML = "";

    // 📄 PDF
    if (file.type === "application/pdf") {
        viewer.innerHTML = `<iframe src="${file.data}"></iframe>`;
    }

    // 🎥 vídeo
    else if (file.type.startsWith("video/")) {
        viewer.innerHTML = `
            <video controls>
                <source src="${file.data}">
            </video>
        `;
    }

    // 📝 texto / json / outros
    else {
        viewer.innerHTML = `<textarea style="width:100%;height:200px;">${atob(file.data.split(",")[1])}</textarea>`;
    }
}

// DELETE
function del(key) {
    localStorage.removeItem(key);
    load();
}

// LOGOUT
function logout() {
    location.reload();
}

// INIT
load();

</script>

</body>
</html>
